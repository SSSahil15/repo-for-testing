repos:
  # ── Secrets detection (prevent committing API keys, tokens, etc.) ──
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: '🔐 detect-secrets'
        args: ['--baseline', '.secrets.baseline']

  # ── General pre-commit checks ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        name: '📦 No large files (>1MB)'
        args: ['--maxkb=1024']
      - id: check-merge-conflict
        name: '🔀 No merge conflict markers'
      - id: detect-private-key
        name: '🔑 No private keys'
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # ── npm audit (run before push) ──
  - repo: local
    hooks:
      - id: npm-audit-backend
        name: '📦 npm audit (backend)'
        entry: bash -c 'cd backend && npm audit --audit-level=critical'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: npm-audit-frontend
        name: '📦 npm audit (frontend)'
        entry: bash -c 'cd frontend && npm audit --audit-level=critical'
        language: system
        pass_filenames: false
        stages: [pre-push]
