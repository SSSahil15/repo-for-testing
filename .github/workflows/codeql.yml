name: "🔍 CodeQL SAST Analysis"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 1" # Monday 3am UTC — staggered from security-scan

permissions:
  contents:        read
  security-events: write
  actions:         read

jobs:
  analyze:
    name: "🔍 CodeQL — ${{ matrix.language }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
        # Add 'java' or 'go' here if they are introduced

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        # fetch-depth default (1) is sufficient for CodeQL on interpreted languages

      # Install deps so CodeQL autobuild can resolve imports correctly
      - name: "⚙️ Setup Node.js"
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "📦 Install Node deps"
        if: matrix.language == 'javascript-typescript'
        run: |
          cd backend  && npm ci
          cd ../frontend && npm ci

      - name: "🐍 Setup Python"
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install Python deps"
        if: matrix.language == 'python'
        run: pip install -r ai/requirements.txt

      # ── CodeQL core ──
      - name: "🔧 Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: "🏗️ Autobuild"
        uses: github/codeql-action/autobuild@v3

      # analyze uploads SARIF to Security tab automatically (upload: true default)
      # Do NOT add a separate upload-sarif step — it causes duplicate alerts
      - name: "🔍 Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: "📋 CodeQL summary"
        if: always()
        run: |
          echo "## 🔍 CodeQL — ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results are in **Security → Code scanning alerts** tab." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Language | \`${{ matrix.language }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Query suite | \`security-and-quality\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
