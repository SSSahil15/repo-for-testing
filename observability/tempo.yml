server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

compactor:
  ring:
    kvstore:
      store: memberlist

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: 0.05

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: devpulse-local
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://devpulse_prometheus:9090/api/v1/write
        send_exemplars: true

memberlist:
  join_members: []

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
