global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'devpulse-local'

rule_files:
  - /etc/prometheus/alerting_rules.yml

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── DevPulse Backend (Node.js) ─────────────────────────────────────────────
  - job_name: 'devpulse-backend'
    static_configs:
      - targets: ['devpulse_backend:4000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── DevPulse AI Service (Python/FastAPI) ───────────────────────────────────
  - job_name: 'devpulse-ai'
    static_configs:
      - targets: ['devpulse_ai:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['devpulse_redis_exporter:9121']

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['devpulse_postgres_exporter:9187']

  # ── OTel Collector self-metrics ─────────────────────────────────────────────
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['devpulse_otel_collector:8889']
