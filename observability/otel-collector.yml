receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  # Enrich spans with resource attributes
  resourcedetection:
    detectors: [docker]
    timeout: 5s

exporters:
  # Forward traces to Tempo
  otlp/tempo:
    endpoint: devpulse_tempo:4317
    tls:
      insecure: true

  # Expose collector's own metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otelcol

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
