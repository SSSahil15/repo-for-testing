name: DevPulse Continuous Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  devpulse-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        id: tests
        run: |
          npm test || echo "tests_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Send results to DevPulse
        run: |
          curl -X POST "${{ secrets.DEVPULSE_URL }}/webhooks/github" \
          -H "Content-Type: application/json" \
          -d @- <<EOF
          {
            "repository": "${{ github.repository }}",
            "runId": "${{ github.run_id }}",
            "status": "${{ job.status }}",
            "conclusion": "${{ steps.tests.outputs.tests_failed == 'true' && 'failure' || 'success' }}",
            "results": {
              "trivy": $(cat trivy-results.json)
            }
          }
          EOF
