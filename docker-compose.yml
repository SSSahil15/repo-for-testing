version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devpulse-backend:latest
    container_name: devpulse_backend
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://devpulse:devpulse@postgres:5432/devpulse
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://localhost:4000
      - FRONTEND_URL=http://localhost:5174
      - AI_SERVICE_URL=http://ai:8000
      - SENTRY_RELEASE=devpulse-backend@local
    depends_on:
      - ai
      - postgres
      - redis
    networks:
      - devpulse_network
    restart: unless-stopped

  backend_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devpulse-backend:latest
    container_name: devpulse_worker
    command: ['node', 'src/worker.js']
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://devpulse:devpulse@postgres:5432/devpulse
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai:8000
      - SENTRY_RELEASE=devpulse-backend@local
      - OTEL_SERVICE_NAME=devpulse-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://devpulse_otel_collector:4318
    depends_on:
      - ai
      - postgres
      - redis
    networks:
      - devpulse_network
    # Worker has no HTTP port — health check via process existence
    healthcheck:
      test: ['CMD-SHELL', "pgrep -f 'node src/worker.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: devpulse-ai:latest
    container_name: devpulse_ai
    ports:
      - '8000:8000'
    env_file:
      - ./ai/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DATABASE_URL=postgresql://devpulse:devpulse@postgres:5432/devpulse
      - SENTRY_ENVIRONMENT=development
      - SENTRY_RELEASE=devpulse-ai@local
    networks:
      - devpulse_network
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    container_name: devpulse_postgres
    environment:
      - POSTGRES_USER=devpulse
      - POSTGRES_PASSWORD=devpulse
      - POSTGRES_DB=devpulse
    ports:
      - '5432:5432'
    volumes:
      - devpulse_pgdata:/var/lib/postgresql/data
    networks:
      - devpulse_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devpulse_redis
    ports:
      - '6379:6379'
    networks:
      - devpulse_network
    restart: unless-stopped

volumes:
  devpulse_pgdata:
    name: devpulse_postgres_data

networks:
  devpulse_network:
    name: devpulse_local_net
