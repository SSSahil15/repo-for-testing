version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devpulse-backend:latest
    container_name: devpulse_backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://devpulse:devpulse@postgres:5432/devpulse
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://localhost:4000
      - FRONTEND_URL=http://localhost:5174
      - AI_SERVICE_URL=http://ai:8000
      - SENTRY_RELEASE=devpulse-backend@local
    depends_on:
      - ai
      - postgres
      - redis
    networks:
      - devpulse_network
    restart: unless-stopped

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: devpulse-ai:latest
    container_name: devpulse_ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SENTRY_ENVIRONMENT=development
      - SENTRY_RELEASE=devpulse-ai@local
    networks:
      - devpulse_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: devpulse_postgres
    environment:
      - POSTGRES_USER=devpulse
      - POSTGRES_PASSWORD=devpulse
      - POSTGRES_DB=devpulse
    ports:
      - "5432:5432"
    volumes:
      - devpulse_pgdata:/var/lib/postgresql/data
    networks:
      - devpulse_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devpulse_redis
    ports:
      - "6379:6379"
    networks:
      - devpulse_network
    restart: unless-stopped

volumes:
  devpulse_pgdata:
    name: devpulse_postgres_data

networks:
  devpulse_network:
    name: devpulse_local_net
